server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker_containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker_containers
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages:
      # 解析 Docker 的 JSON 日志格式
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      # 提取容器 ID（从文件路径中）
      - regex:
          source: filename
          expression: '.*/containers/([^/]+)/.*\.log'
      - labels:
          container_id:
      # 设置日志内容为 log 字段
      - output:
          source: log